name: Android CI Build

# Script ini akan berjalan otomatis setiap ada kode baru yang di-push ke branch main
# atau bisa dijalankan manual lewat tombol di GitHub (workflow_dispatch)
on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    # 1. Mengambil kode dari repository
    - name: Checkout Repository
      uses: actions/checkout@v4

    # 2. Menyiapkan Java versi 17 (Sesuai dengan konfigurasi gradle kamu)
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    # 3. Setup Gradle (Bahkan jika gradlew tidak ada, action ini akan menanganinya)
    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v3
      with:
        gradle-version: '8.4'

    # 4. Mengeksekusi perintah build APK (Mode Debug untuk testing)
    - name: Build Debug APK
      run: gradle assembleDebug --stacktrace

    # 5. Menyimpan hasil APK agar bisa didownload
    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: iszipos-debug-apk
        path: app/build/outputs/apk/debug/app-debug.apk
